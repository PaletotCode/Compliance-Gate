version: "3.8"

networks:
  parity_net:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    container_name: parity_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-compliance_gate}
    networks:
      - parity_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: parity_redis
    networks:
      - parity_net

  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    container_name: parity_api
    command: uvicorn src.compliance_gate.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-compliance_gate}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=retests
      - PYTHONPATH=/app/src
    volumes:
      - ../..:/workspace:ro
      - ../../src:/app/src:ro
    networks:
      - parity_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  parity_tester:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tester
    container_name: parity_tester
    # Explicit entrypoint override to run parity script
    entrypoint: ["python", "/retests/scripts/run_parity_retests.py"]
    environment:
      - WORKSPACE=/workspace
      - API_BASE_URL=http://api:8000
      - STALE_DAYS=30
    volumes:
      - ../..:/workspace:ro
      - ../logs:/retests/logs
      - ../output:/retests/output
    networks:
      - parity_net
    depends_on:
      api:
        condition: service_started
    restart: "no"
