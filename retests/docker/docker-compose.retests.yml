version: "3.8"

networks:
  retests_net:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    container_name: retests_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-compliance_gate}
    networks:
      - retests_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: retests_redis
    networks:
      - retests_net

  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    container_name: retests_api
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.compliance_gate.main:app --host 0.0.0.0 --port 8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-compliance_gate}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=retests
      - PYTHONPATH=/app/src
      - CSV_ASSET_PATH=/workspace/ASSET.CSV
      - CSV_UEM_PATH=/workspace/UEM.csv
      - CSV_AD_PATH=/workspace/AD.csv
      - CSV_EDR_PATH=/workspace/EDR.csv
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-change-me-in-production}
      - AUTH_RECOVERY_PEPPER=${AUTH_RECOVERY_PEPPER:-change-recovery-pepper}
      - AUTH_SECRET_PROTECTION_KEY=${AUTH_SECRET_PROTECTION_KEY:-change-secret-protection-key}
      - AUTH_BOOTSTRAP_ADMIN_USERNAME=${AUTH_BOOTSTRAP_ADMIN_USERNAME:-admin}
      - AUTH_BOOTSTRAP_ADMIN_PASSWORD=${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-Admin1234}
    volumes:
      # Mount repo root read-only so the api can find the CSVs + source
      - ../..:/workspace:ro
      - ../../src:/app/src:ro
    networks:
      - retests_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 8s
      timeout: 5s
      retries: 10
      start_period: 15s

  tester:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tester
    container_name: retests_tester
    environment:
      - WORKSPACE=/workspace
      - API_BASE_URL=http://api:8000
      - RUN_ENDPOINT_TESTS=true
    volumes:
      # Repo root read-only → CSV access
      - ../..:/workspace:ro
      # Output and logs are writable
      - ../logs:/retests/logs
      - ../output:/retests/output
    networks:
      - retests_net
    depends_on:
      api:
        condition: service_started
    restart: "no"

  parity_tester:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tester
    container_name: retests_parity_tester
    # Override entrypoint to run parity script
    command: ["python", "/retests/scripts/run_parity_retests.py"]
    environment:
      - WORKSPACE=/workspace
      - API_BASE_URL=http://api:8000
      - STALE_DAYS=30
    volumes:
      - ../..:/workspace:ro
      - ../logs:/retests/logs
      - ../output:/retests/output
    networks:
      - retests_net
    depends_on:
      tester:
        condition: service_completed_successfully
    restart: "no"
