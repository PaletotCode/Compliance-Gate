version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: compliance_gate_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-compliance_gate}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: compliance_gate_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: compliance_gate_api
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.compliance_gate.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-compliance_gate}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - CG_DATA_DIR=/workspace
      - CG_UPLOAD_DIR=/workspace/uploads
      - DEFAULT_TENANT_ID=default
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-change-me-in-production}
      - AUTH_RECOVERY_PEPPER=${AUTH_RECOVERY_PEPPER:-change-recovery-pepper}
      - AUTH_SECRET_PROTECTION_KEY=${AUTH_SECRET_PROTECTION_KEY:-change-secret-protection-key}
      - AUTH_BOOTSTRAP_ADMIN_USERNAME=${AUTH_BOOTSTRAP_ADMIN_USERNAME:-admin}
      - AUTH_BOOTSTRAP_ADMIN_PASSWORD=${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-Admin1234}
    volumes:
      - .:/app
      - ./workspace:/workspace
      - uploads_data:/workspace/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  uploads_data:
